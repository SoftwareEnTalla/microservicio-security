services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - entalla-net
      - shared-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Importante: sin mapeo de puerto al host para evitar conflictos
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - entalla-net
      - shared-net
    profiles:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  entalla-net:
    driver: bridge
  shared-net:
    external: true

volumes:
  pgdata:
